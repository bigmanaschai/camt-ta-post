<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ประกาศรับสมัครผู้ช่วยสอน (Teaching Assistant) — CAMT</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --cream:#F5F4F7; --sand:#F0EFF4; --clay:#E7E5EE; --line:#E7E5EE;
    --surface:#FFFFFF; --surface-hover:#F7F6FB;
    --accent:#6C5CE7; --accent-soft:#8A7CF0; --accent-dark:#5749C9;
    --brown:#5B5870; --ink:#1E1B2E; --brown-soft:#9A97A8;
    --radius-x:.75rem; --radius-2x:1rem;
    --shadow-soft:0 1px 2px rgba(30,27,46,.04),0 4px 16px rgba(30,27,46,.06);
    --shadow-soft-lg:0 2px 6px rgba(30,27,46,.06),0 12px 32px rgba(30,27,46,.10);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--cream);color:var(--ink);font-family:'Kanit',sans-serif;font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased}
  .mono{font-family:'JetBrains Mono','Kanit',monospace;font-variant-numeric:tabular-nums}
  .wrap{max-width:1080px;margin:0 auto;padding:0 20px 64px}

  header.app{position:sticky;top:0;z-index:30;background:rgba(245,244,247,.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--clay)}
  header.app .bar{max-width:1080px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:12px}
  .logo{width:38px;height:38px;border-radius:var(--radius-x);background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;box-shadow:var(--shadow-soft);font-size:16px}
  header.app h1{font-size:18px;font-weight:600;color:var(--ink);margin:0}
  header.app p{font-size:12px;color:var(--brown);margin:0}

  .card{border-radius:var(--radius-2x);border:1px solid var(--clay);background:var(--surface);box-shadow:var(--shadow-soft)}
  .p5{padding:20px}
  .page-title{font-size:20px;font-weight:600;color:var(--ink);margin:28px 0 4px}
  .sub{font-size:14px;color:var(--brown);margin:0 0 20px}
  .ctitle{font-size:16px;font-weight:600;color:var(--ink);margin:0}
  .label{font-size:12px;font-weight:500;color:var(--brown)}
  .muted{color:var(--brown-soft)}
  .body{font-size:14px;color:var(--brown)}
  h3.sec{font-size:13px;font-weight:600;color:var(--ink);margin:0 0 8px;text-transform:uppercase;letter-spacing:.04em}

  .banner{border-radius:var(--radius-2x);background:rgba(240,239,244,.7);padding:12px 16px;font-size:13px;color:var(--brown)}

  .badge{display:inline-flex;align-items:center;border-radius:999px;padding:2px 10px;font-size:12px;font-weight:500;white-space:nowrap}
  .badge-accent{background:rgba(108,92,231,.15);color:var(--accent-dark)}
  .badge-neutral{background:rgba(91,88,112,.15);color:var(--ink)}
  .badge-soft{background:rgba(231,229,238,.5);color:var(--brown-soft)}

  .kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:14px}
  @media(min-width:760px){.kpis{grid-template-columns:repeat(4,1fr)}}
  .kpi{border-radius:var(--radius-2x);border:1px solid var(--clay);background:var(--surface);padding:14px 16px}
  .kpi .k{font-size:12px;color:var(--brown)}
  .kpi .v{font-size:20px;font-weight:600;color:var(--ink);margin-top:2px}
  .kpi.hl{border-color:rgba(108,92,231,.4);background:rgba(108,92,231,.05)}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:var(--radius-x);padding:8px 16px;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid transparent;font-family:inherit;text-decoration:none}
  .btn-primary{background:var(--accent);color:#fff;box-shadow:var(--shadow-soft)}
  .btn-primary:hover{background:var(--accent-soft)}
  .tabs{display:inline-flex;gap:8px;background:var(--sand);padding:4px;border-radius:var(--radius-x)}
  .tab{border:none;background:transparent;border-radius:.55rem;padding:7px 16px;font-size:13px;font-weight:500;color:var(--brown);cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:flex-start;line-height:1.2}
  .tab small{font-size:11px;color:var(--brown-soft);font-weight:400}
  .tab.active{background:#fff;color:var(--accent-dark);box-shadow:var(--shadow-soft)}
  .tab.active small{color:var(--accent-dark)}

  .meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-top:16px}
  .meta .label{display:block;margin-bottom:2px}
  .meta .val{font-size:14px;color:var(--ink);font-weight:500}

  .tbl-wrap{border:1px solid var(--clay);border-radius:var(--radius-2x);overflow:hidden;margin-top:10px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead th{background:var(--sand);text-align:left;padding:10px 16px;font-size:12px;font-weight:600;color:var(--brown);border-bottom:1px solid var(--clay)}
  tbody td{padding:11px 16px;border-bottom:1px solid var(--clay);color:var(--brown);vertical-align:top}
  tbody tr:nth-child(even){background:rgba(240,239,244,.45)}
  tbody tr:hover{background:rgba(108,92,231,.06)}
  tbody tr:last-child td{border-bottom:none}
  td .topic{color:var(--ink);font-weight:500}
  .grouprow td{background:rgba(108,92,231,.06);font-weight:600;color:var(--accent-dark);font-size:12px;text-transform:uppercase;letter-spacing:.04em;border-top:2px solid rgba(91,88,112,.4)}
  .lab-list{margin:4px 0 0;padding:0;list-style:none;display:flex;flex-direction:column;gap:2px}
  .lab-list li{font-size:12px;color:var(--brown)}
  .lab-list li::before{content:"›";color:var(--accent);margin-right:6px}

  .divider{height:1px;background:var(--clay);margin:18px 0}
  .contact a{color:var(--accent-dark);text-decoration:none}
  .contact a:hover{text-decoration:underline}
  .foot{font-size:12px;color:var(--brown-soft);margin-top:24px;text-align:center}
  .pill-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
  ul.obj{margin:8px 0 0;padding-left:18px;color:var(--brown);font-size:14px}
  ul.obj li{margin-bottom:5px}
</style>
</head>
<body>

<header class="app">
  <div class="bar">
    <div class="logo">CA</div>
    <div>
      <h1>ระบบประกาศรับสมัครผู้ช่วยสอน</h1>
      <p>วิทยาลัยศิลปะ สื่อ และเทคโนโลยี · หลักสูตรบูรณาการอุตสาหกรรมดิจิทัล</p>
    </div>
  </div>
</header>

<div class="wrap">
  <h2 class="page-title">ประกาศรับสมัครผู้ช่วยสอน (Teaching Assistant)</h2>
  <p class="sub">ภาคการศึกษาที่ 1/2569 — ปฏิบัติงานในคาบ Lab ของรายวิชา</p>

  <div id="app"></div>

  <p class="foot">สกัดข้อมูลจากบันทึกข้อความขอความอนุเคราะห์ฯ และ Course Syllabus</p>
</div>

<script>
/* =========================================================================
   DATA — เพิ่มวิชาใหม่ได้โดย push อ็อบเจ็กต์เข้าใน array นี้
   ========================================================================= */
const COURSES = [
  {
    code: "960231",
    name: "DII 1",
    subtitle: "Database Management System + Computer Network",
    lecturer: "อาจารย์ ดร.วรัญญา มหานันท์",
    term: "1/2569",
    credit: "3 (3-0-6)",
    pay: "200 บาท / ชั่วโมง",
    description: "รายวิชานี้ครอบคลุมเนื้อหาทั้งด้านระบบฐานข้อมูล (Database) และระบบเครือข่ายคอมพิวเตอร์ (Computer Network) ซึ่งเป็นวิชาที่มีความสำคัญเชิงเทคนิคสูง ผู้เรียนจะได้ฝึกปฏิบัติจริง (Lab) และจำลองสถานการณ์จริงในชั้นเรียน เพื่อให้เกิดทักษะและความเข้าใจอย่างถ่องแท้ ผู้ช่วยสอนจะมีบทบาทสำคัญในการดูแลผู้เรียนตลอดช่วงการฝึกปฏิบัติเหล่านี้",
    taRole: "ผู้ช่วยสอนมีหน้าที่ดูแลและให้คำปรึกษาทางเทคนิคแก่นักศึกษาเป็นรายบุคคลขณะลงมือปฏิบัติ Lab และช่วยตรวจงานในรายวิชา เพื่อให้กิจกรรมการเรียนดำเนินไปอย่างมีประสิทธิภาพ",
    deliverables: [
      "ทบทวนและอธิบายแนวคิดพื้นฐานของฐานข้อมูล (Database concept) ให้ผู้เรียนเข้าใจระหว่างทำ Lab พร้อมตอบข้อสงสัยเป็นรายบุคคล",
      "สาธิตและให้คำแนะนำการเขียนคำสั่ง SQL ผ่านโจทย์/กรณีศึกษา (case studies) ตรวจสอบและช่วยผู้เรียนแก้ไขคำสั่งให้ถูกต้อง",
      "ให้คำปรึกษาและตรวจทานการออกแบบฐานข้อมูลตามหลัก Normalization พร้อมชี้จุดที่ควรปรับปรุง",
      "ดูแลและช่วยแก้ปัญหาระหว่างการทำ Lab ด้านเครือข่ายคอมพิวเตอร์ (netcat/telnet, HTTP, DNS, Subnetting) ให้ผู้เรียนทำงานสำเร็จ"
    ],
    workHours: "19.5",
    labSessions: 13,
    workPeriod: "22 มิ.ย. – 10 ส.ค. 2026",
    sections: {
      "Sec 001": { label: "Sec 001", time: "11:00 – 12:30 น." },
      "Sec 002": { label: "Sec 002", time: "15:00 – 16:30 น." }
    },
    /* ตารางนี้แสดงเฉพาะคาบ Lab ที่ TA เข้างาน (ไม่รวมคาบสอบ) */
    schedule: [
      { group: "ฐานข้อมูล (Database)" },
      { date: "22 มิ.ย. 2026", content: "Introduction and Relational data model · ER Model: Entity", labs: ["Lab 01 Introduction"] },
      { date: "23 มิ.ย. 2026", content: "ER Model: Attribute, Relationship", labs: ["Lab 02a E", "Lab 02b R"] },
      { date: "29 มิ.ย. 2026", content: "Alt Notation: UML, Craw's foot · ER Model Mapping", labs: ["Lab 02c alternative notation", "Lab 03 ER Mapping"] },
      { date: "30 มิ.ย. 2026", content: "Normalization", labs: ["Lab 04 Normalization"] },
      { date: "6 ก.ค. 2026",  content: "SQL: CREATE, ALTER, INSERT, UPDATE, DELETE", labs: ["Lab 05 SQL Create"] },
      { date: "7 ก.ค. 2026",  content: "SQL: SELECT ORDER BY, LIMIT · MIN MAX SUM COUNT, GROUP BY", labs: ["Lab 06 SQL Select"] },
      { date: "13 ก.ค. 2026", content: "SQL: Subquery", labs: ["Lab 07 SQL Subquery"] },
      { date: "14 ก.ค. 2026", content: "More SQL: JOIN UNION · Mix SQL · View", labs: ["Lab 08 SQL Join"] },
      { date: "20 ก.ค. 2026", content: "Query optimization & NoSQL", labs: ["Lab 09 Query optimization"] },
      { group: "เครือข่ายคอมพิวเตอร์ (Computer Network)" },
      { date: "27 ก.ค. 2026", content: "Introduction to Computer Network", labs: ["Lab: Using netcat and telnet to send raw data between processes"] },
      { date: "3 ส.ค. 2026",  content: "OSI model and TCP/IP Model", labs: ["Lab 02 HTTP"] },
      { date: "4 ส.ค. 2026",  content: "Data Traveling and Network security", labs: ["Lab 03 DNS", "Lab 04 Port"] },
      { date: "10 ส.ค. 2026", content: "Server and REST API concepts and examples", labs: ["Lab 05 Subnetting"] }
    ],
    applyUrl: "https://www.facebook.com/camt.ta"
  }
];

/* ===================== RENDER ===================== */
const state = {};
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

function scheduleRows(course, sectionKey){
  const time = course.sections[sectionKey].time;
  return course.schedule.map(r=>{
    if(r.group) return `<tr class="grouprow"><td colspan="3">${esc(r.group)}</td></tr>`;
    const labs = (r.labs||[]).map(l=>`<li>${esc(l)}</li>`).join("");
    return `<tr>
      <td class="mono">${esc(r.date)}</td>
      <td class="mono">${esc(time)}</td>
      <td>
        <span class="topic">${esc(r.content)}</span>
        ${labs?`<ul class="lab-list">${labs}</ul>`:""}
      </td>
    </tr>`;
  }).join("");
}

function renderCourse(course, idx){
  const sk = state[idx];
  const secKeys = Object.keys(course.sections);
  const tabs = secKeys.map(k=>{
    const s = course.sections[k];
    return `<button class="tab ${k===sk?'active':''}" onclick="setSection(${idx},'${k}')">${esc(s.label)}<small>${esc(s.time)}</small></button>`;
  }).join("");
  const deliverables = course.deliverables.map(o=>`<li>${esc(o)}</li>`).join("");

  return `
  <div class="card p5" style="margin-bottom:22px">

    <div style="display:flex;flex-wrap:wrap;gap:10px;align-items:flex-start;justify-content:space-between">
      <div>
        <div class="pill-row" style="margin:0 0 8px">
          <span class="badge badge-accent mono">${esc(course.code)}</span>
          <span class="badge badge-soft">ภาค ${esc(course.term)}</span>
          <span class="badge badge-neutral">${secKeys.length} Section</span>
        </div>
        <h3 class="ctitle">${esc(course.name)} <span class="muted" style="font-weight:400">(${esc(course.subtitle)})</span></h3>
      </div>
      <a class="btn btn-primary" href="${esc(course.applyUrl)}" target="_blank" rel="noopener">สนใจสมัคร / สอบถาม</a>
    </div>

    <div class="meta">
      <div><span class="label">อาจารย์ผู้รับผิดชอบวิชา</span><span class="val">${esc(course.lecturer)}</span></div>
      <div><span class="label">หน่วยกิต</span><span class="val mono">${esc(course.credit)}</span></div>
      <div><span class="label">ค่าตอบแทน</span><span class="val">${esc(course.pay)}</span></div>
    </div>

    <div class="divider"></div>

    <h3 class="sec">คำอธิบายรายวิชา (โดยย่อ)</h3>
    <p class="body" style="margin:0">${esc(course.description)}</p>

    <h3 class="sec" style="margin-top:16px">บทบาทและสิ่งที่ผู้ช่วยสอนต้องส่งมอบ</h3>
    <p class="body" style="margin:0 0 4px">${esc(course.taRole)}</p>
    <ul class="obj">${deliverables}</ul>

    <div class="kpis">
      <div class="kpi hl"><div class="k">คาบ Lab ที่เข้างาน</div><div class="v">${course.labSessions} <span style="font-size:13px">คาบ</span></div></div>
      <div class="kpi hl"><div class="k">ชั่วโมงทำงานรวม / Section</div><div class="v mono">${esc(course.workHours)} <span style="font-size:13px">ชม.</span></div></div>
      <div class="kpi"><div class="k">ค่าตอบแทน</div><div class="v" style="font-size:16px">${esc(course.pay)}</div></div>
      <div class="kpi"><div class="k">ช่วงเวลาทำงาน</div><div class="v" style="font-size:15px">${esc(course.workPeriod)}</div></div>
    </div>

    <div class="divider"></div>

    <div style="display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:space-between;margin-bottom:6px">
      <h3 class="sec" style="margin:0">ตารางเข้างาน (คาบ Lab)</h3>
      <div class="tabs">${tabs}</div>
    </div>
    <div class="banner" style="margin:6px 0 4px">ตารางนี้แสดงเฉพาะ <b style="color:var(--accent-dark)">คาบ Lab</b> ที่ผู้ช่วยสอนต้องเข้าปฏิบัติงาน (ช่วง 1 ชม. 30 นาที หลัง Lecture จบ) — เนื้อหาทั้งสอง Section เหมือนกัน ต่างกันที่ช่วงเวลา: <b>Sec 001</b> 11:00–12:30 น. · <b>Sec 002</b> 15:00–16:30 น. (ไม่รวมคาบสอบ)</div>

    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th style="width:120px">วันที่</th>
          <th style="width:140px">เวลาเข้างาน</th>
          <th>หัวข้อที่สอน / งานปฏิบัติ (Lab)</th>
        </tr></thead>
        <tbody>${scheduleRows(course, sk)}</tbody>
      </table>
    </div>

    <div class="divider"></div>
    <h3 class="sec">ช่องทางติดต่อ / สมัคร</h3>
    <div class="contact body">📘 TA CAMT Page: <a href="${esc(course.applyUrl)}" target="_blank" rel="noopener">facebook.com/camt.ta</a></div>
  </div>`;
}

function setSection(idx, key){ state[idx]=key; draw(); }
function draw(){
  document.getElementById("app").innerHTML =
    COURSES.map((c,i)=>{ if(!state[i]) state[i]=Object.keys(c.sections)[0]; return renderCourse(c,i); }).join("");
}
draw();
</script>
</body>
</html>
